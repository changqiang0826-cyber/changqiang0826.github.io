<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>一封信</title>
  <style>

    :root {
      --paper: #fdf6e3;
      --paper-dark: #f5e6c8;
      --ink: #3a2e24;
      --ink-light: #6b5b4e;
      --line: #c8b99a;
      --accent: #c2705a;
      --shadow: rgba(58, 46, 36, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #e8ddd3;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(210, 180, 140, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(194, 112, 90, 0.08) 0%, transparent 50%);
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ====== PASSWORD SCREEN ====== */
    .password-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 日落天空分层 */
      background: linear-gradient(to bottom,
        #1a1040 0%,
        #2d1b6e 12%,
        #6b2f8a 24%,
        #c0426a 38%,
        #e8714a 52%,
        #f4a245 62%,
        #fdd28a 72%,
        #feebc0 80%,
        #fde9c0 100%);
      transition: opacity 0.8s ease, visibility 0.8s ease;
      overflow: hidden;
    }
    /* 太阳 */
    .password-screen::before {
      content: '';
      position: absolute;
      width: 90px; height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle,
        #fff5c0 0%,
        #fdd87a 35%,
        #f9a03c 65%,
        transparent 100%);
      bottom: 32%;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 60px 30px rgba(253,200,80,0.35), 0 0 120px 60px rgba(240,120,50,0.15);
      pointer-events: none;
    }
    /* 山峦剪影 */
    .password-screen::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 35%;
      background:
        /* 近景深色山 */
        radial-gradient(ellipse 55% 80% at 20% 100%, #0d0820 0%, transparent 100%),
        radial-gradient(ellipse 50% 90% at 75% 100%, #110c28 0%, transparent 100%),
        radial-gradient(ellipse 40% 70% at 50% 100%, #1a1040 0%, transparent 100%),
        /* 远景山 */
        radial-gradient(ellipse 70% 60% at 30% 100%, #2d1b6e44 0%, transparent 100%),
        radial-gradient(ellipse 60% 55% at 70% 100%, #6b2f8a33 0%, transparent 100%);
      pointer-events: none;
    }
    .password-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .lock-card {
      text-align: center;
      padding: 52px 44px 44px;
      max-width: 380px;
      width: 90%;
      position: relative;
      background: rgba(15, 8, 35, 0.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .lock-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 22px;
      background: rgba(255,255,255,0.12);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(180,100,200,0.2);
    }
    .lock-icon svg {
      width: 34px;
      height: 34px;
    }

    .lock-card h2 {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 26px;
      color: #fff;
      margin-bottom: 6px;
      font-weight: normal;
      text-shadow: 0 1px 8px rgba(120,60,160,0.25);
    }
    .lock-card .subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 32px;
      letter-spacing: 2px;
    }

    .password-input-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .password-input-wrap input {
      width: 100%;
      padding: 13px 20px;
      border: 1.5px solid rgba(255,255,255,0.5);
      border-radius: 50px;
      background: rgba(255,255,255,0.3);
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 15px;
      color: #fff;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
      text-align: center;
      letter-spacing: 3px;
    }
    .password-input-wrap input:focus {
      border-color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.4);
    }
    .password-input-wrap input::placeholder {
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
    }

    .unlock-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: rgba(255,255,255,0.9);
      color: #a060c0;
      border: none;
      border-radius: 50px;
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
      letter-spacing: 3px;
      box-shadow: 0 4px 15px rgba(160,96,192,0.3);
    }
    .unlock-btn:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(160,96,192,0.4);
    }
    .unlock-btn:active { transform: translateY(0); }

    .error-msg {
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      margin-top: 14px;
      min-height: 20px;
      letter-spacing: 1px;
      transition: opacity 0.3s;
    }

    /* ====== LETTER CONTENT ====== */
    .letter-container {
      opacity: 0;
      transition: opacity 1s ease 0.5s;
      max-width: 750px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }
    .letter-container.visible { opacity: 1; }

    /* envelope opening animation */
    .envelope-header {
      text-align: center;
      padding: 40px 0 20px;
      animation: fadeDown 1s ease 0.8s both;
    }
    .envelope-header h1 {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 36px;
      font-weight: normal;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .envelope-header .date {
      font-size: 13px;
      color: var(--ink-light);
      letter-spacing: 2px;
    }

    /* paper sheet */
    .paper {
      background: var(--paper);
      border-radius: 4px;
      padding: 50px 45px;
      margin: 20px 0;
      position: relative;
      box-shadow:
        0 1px 3px var(--shadow),
        0 8px 24px var(--shadow),
        inset 0 0 80px rgba(245, 230, 200, 0.5);
      background-image:
        repeating-linear-gradient(
          transparent,
          transparent 31px,
          var(--line) 31px,
          var(--line) 32px
        );
      background-position-y: 18px;
      animation: fadeUp 1s ease both;
    }
    .paper::before {
      content: '';
      position: absolute;
      left: 42px;
      top: 0;
      bottom: 0;
      width: 1.5px;
      background: rgba(194, 112, 90, 0.25);
    }
    .paper::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, transparent 50%, var(--paper-dark) 50%);
      border-radius: 0 4px 0 0;
    }

    .paper .greeting {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 24px;
      color: var(--ink);
      margin-bottom: 20px;
      line-height: 32px;
      padding-left: 20px;
    }

    .paper .body-text {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 20px;
      line-height: 32px;
      color: var(--ink);
      padding-left: 20px;
      text-align: justify;
      white-space: pre-wrap;
    }

    .paper .signature {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 22px;
      color: var(--accent);
      text-align: right;
      margin-top: 30px;
      padding-right: 20px;
    }

    /* ====== PHOTO GALLERY ====== */
    .gallery-section {
      margin: 30px 0;
      animation: fadeUp 1s ease 0.3s both;
    }
    .gallery-title {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 22px;
      text-align: center;
      color: var(--ink-light);
      margin-bottom: 20px;
      position: relative;
    }
    .gallery-title::before,
    .gallery-title::after {
      content: '— ';
      color: var(--line);
    }
    .gallery-title::after {
      content: ' —';
    }

    .photo-grid {
      display: grid;
      gap: 16px;
    }
    .photo-grid.layout-2 { grid-template-columns: 1fr 1fr; }
    .photo-grid.layout-3 { grid-template-columns: 1fr 1fr 1fr; }

    .photo-card {
      background: #fff;
      padding: 10px 10px 30px;
      border-radius: 2px;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.08),
        0 1px 2px rgba(0,0,0,0.06);
      transform: rotate(var(--rotate, 0deg));
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      cursor: pointer;
      position: relative;
    }
    .photo-card:hover {
      transform: rotate(0deg) scale(1.03);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      z-index: 10;
    }

    .photo-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      border-radius: 1px;
    }

    .photo-card .caption {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 14px;
      color: var(--ink-light);
      text-align: center;
      margin-top: 10px;
      min-height: 20px;
    }

    /* scattered layout for polaroids */
    .photo-card:nth-child(1) { --rotate: -2.5deg; }
    .photo-card:nth-child(2) { --rotate: 1.8deg; }
    .photo-card:nth-child(3) { --rotate: -1.2deg; }
    .photo-card:nth-child(4) { --rotate: 2.5deg; }
    .photo-card:nth-child(5) { --rotate: -3deg; }
    .photo-card:nth-child(6) { --rotate: 1deg; }
    .photo-card:nth-child(7) { --rotate: -1.8deg; }
    .photo-card:nth-child(8) { --rotate: 2deg; }

    /* tape decoration */
    .photo-card::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%) rotate(var(--tape-rotate, 2deg));
      width: 50px;
      height: 16px;
      background: rgba(255, 235, 180, 0.7);
      border-radius: 1px;
      z-index: 2;
    }
    .photo-card:nth-child(odd)::before { --tape-rotate: -3deg; }
    .photo-card:nth-child(even)::before { --tape-rotate: 4deg; }

    /* ====== LIGHTBOX ====== */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(30, 25, 20, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s, visibility 0.4s;
      cursor: pointer;
    }
    .lightbox.active { opacity: 1; visibility: visible; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* ====== FOOTER ====== */
    .letter-footer {
      text-align: center;
      padding: 30px 0;
      animation: fadeUp 1s ease 0.5s both;
    }
    .heart {
      display: inline-block;
      font-size: 28px;
      color: var(--accent);
      animation: heartbeat 1.5s ease infinite;
    }

    /* ====== EDIT HINT ====== */
    .edit-hints {
      background: rgba(194, 112, 90, 0.08);
      border: 1px dashed var(--accent);
      border-radius: 8px;
      padding: 24px 28px;
      margin: 30px 0;
      font-size: 14px;
      line-height: 1.8;
      color: var(--ink-light);
    }
    .edit-hints h3 {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      color: var(--accent);
      margin-bottom: 10px;
      font-size: 16px;
    }
    .edit-hints code {
      background: rgba(194, 112, 90, 0.1);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
      color: var(--ink);
    }

    /* ====== DIARY TIMELINE ====== */
    .diary-section {
      margin: 30px 0;
      animation: fadeUp 1s ease 0.3s both;
    }
    .diary-title {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 22px;
      text-align: center;
      color: var(--ink-light);
      margin-bottom: 30px;
    }
    .diary-title::before { content: '— '; color: var(--line); }
    .diary-title::after  { content: ' —'; color: var(--line); }

    .diary-timeline {
      position: relative;
      padding-left: 28px;
    }
    .diary-timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0; bottom: 0;
      width: 1.5px;
      background: var(--line);
    }

    .diary-entry {
      position: relative;
      margin-bottom: 40px;
    }
    .diary-entry::before {
      content: '';
      position: absolute;
      left: -24px;
      top: 6px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--paper);
      box-shadow: 0 0 0 1.5px var(--accent);
    }

    .diary-date {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 13px;
      color: var(--ink-light);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .diary-photo {
      background: #fff;
      padding: 10px 10px 30px;
      border-radius: 2px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.06);
      transform: rotate(var(--rotate, 0deg));
      transition: transform 0.4s, box-shadow 0.4s;
      cursor: pointer;
      position: relative;
      max-width: 420px;
    }
    .diary-photo:hover {
      transform: rotate(0deg) scale(1.02);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .diary-photo img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      border-radius: 1px;
    }
    .diary-photo .caption {
      font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
      font-size: 13px;
      color: var(--ink-light);
      text-align: center;
      margin-top: 10px;
    }
    .diary-photo::before {
      content: '';
      position: absolute;
      top: -6px; left: 50%;
      transform: translateX(-50%) rotate(var(--tape-rotate, 2deg));
      width: 50px; height: 16px;
      background: rgba(255,235,180,0.7);
      border-radius: 1px;
      z-index: 2;
    }
    .diary-entry:nth-child(odd)  .diary-photo { --rotate: -1.5deg; --tape-rotate: -3deg; }
    .diary-entry:nth-child(even) .diary-photo { --rotate:  1.5deg; --tape-rotate:  3deg; }

    /* ====== ANIMATIONS ====== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(1); }
      45% { transform: scale(1.1); }
    }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 600px) {
      .paper { padding: 35px 25px; }
      .paper::before { left: 22px; }
      .paper .greeting { padding-left: 10px; font-size: 20px; }
      .paper .body-text { padding-left: 10px; font-size: 18px; line-height: 32px; }
      .diary-photo { max-width: 100%; }
      .lock-card { padding: 40px 25px; }
    }
  </style>
</head>
<body>

  <!-- ========== PASSWORD SCREEN ========== -->
  <div class="password-screen" id="passwordScreen">
    <div class="lock-card">
      <h2>致 wsy</h2>
      <p class="subtitle">请输入密码查看</p>
      <div class="password-input-wrap">
        <input
          type="password"
          id="passwordInput"
          placeholder="你最爱的人的生日"
          autocomplete="off"
          onkeydown="if(event.key==='Enter')checkPassword()"
        >
      </div>
      <button class="unlock-btn" onclick="checkPassword()">打 开</button>
      <p class="error-msg" id="errorMsg"></p>
    </div>
  </div>

  <!-- ========== LETTER CONTENT ========== -->
  <div class="letter-container" id="letterContent">

    <!-- ===== 音频播放器 ===== -->
    <div style="margin: 20px 0 30px; text-align: center;">
      <audio controls style="width: 100%; border-radius: 8px;">
        <source src="./The Hillside 44.m4a" type="audio/mp4">
        你的浏览器不支持音频播放。
      </audio>
    <p style="font-size: 12px; color: #999; margin-top: 8px;">因为录之前哭的很厉害，语速很慢，我就加了1.5倍速，对不起</p>
    </div>

    <!-- ===== 每日信件 ===== -->
    <div class="diary-section">
      <p class="diary-title">一些想说的话</p>
      <div class="diary-timeline">

        <!-- ── 第 1 天 ── 复制这段来添加新的一天 -->
        <div class="diary-entry">
          <p class="diary-date">第 1 天 · 2026 年 4 月 13 日</p>
          <div class="diary-photo">
            <img src="./WechatIMG111.jpg" alt="第1天的信">
            <p class="caption">2026.4.13</p>
          </div>
        </div>

        <!-- ── 第 2 天 ── -->
        <div class="diary-entry">
          <p class="diary-date">第 2 天 · 2026 年 4 月 14 日</p>
          <div class="diary-photo">
            <img src="./WechatIMG112.jpg" alt="第2天的信">
            <p class="caption"></p>
          </div>
        </div>

        <!-- ── 第 3 天 ── -->
        <div class="diary-entry">
          <p class="diary-date">第 3 天 · 2026 年 4 月 15 日</p>
          <div class="diary-photo">
            <img src="photo_day3.jpg" alt="第3天的信">
            <p class="caption"></p>
          </div>
        </div>

        <!-- ── 第 4 天 ── -->
        <div class="diary-entry">
          <p class="diary-date">第 4 天 · 2026 年 4 月 16 日</p>
          <div class="diary-photo">
            <img src="photo_day4.jpg" alt="第4天的信">
            <p class="caption"></p>
          </div>
        </div>

        <!-- ── 第 5 天 ── -->
        <div class="diary-entry">
          <p class="diary-date">第 5 天 · 2026 年 4 月 17 日</p>
          <div class="diary-photo">
            <img src="photo_day5.jpg" alt="第5天的信">
            <p class="caption"></p>
          </div>
        </div>

        <!-- ── 第 6 天 ── -->
        <div class="diary-entry">
          <p class="diary-date">第 6 天 · 2026 年 4 月 18 日</p>
          <div class="diary-photo">
            <img src="photo_day6.jpg" alt="第6天的信">
            <p class="caption"></p>
          </div>
        </div>

        <!-- ── 第 7 天 ── -->
        <div class="diary-entry">
          <p class="diary-date">第 7 天 · 2026 年 4 月 19 日</p>
          <div class="diary-photo">
            <img src="photo_day7.jpg" alt="第7天的信">
            <p class="caption"></p>
          </div>
        </div>

      </div>
    </div>


  </div>

  <!-- ========== LIGHTBOX ========== -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    // ============ 在这里设置你的密码 ============
    const PASSWORD = "0327";
    // ==========================================

    function checkPassword() {
      const input = document.getElementById('passwordInput');
      const error = document.getElementById('errorMsg');
      if (input.value === PASSWORD) {
        document.getElementById('passwordScreen').classList.add('hidden');
        document.getElementById('letterContent').classList.add('visible');
        error.textContent = '';
      } else {
        error.textContent = '密码不对哦，再想想～';
        input.value = '';
        input.focus();
        // shake animation
        const card = document.querySelector('.lock-card');
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'shake 0.4s ease';
      }
    }

    // Lightbox for photos
    document.querySelectorAll('.diary-photo img').forEach(img => {
      img.addEventListener('click', () => {
        document.getElementById('lightboxImg').src = img.src;
        document.getElementById('lightbox').classList.add('active');
      });
    });

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    // Add shake keyframes dynamically
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-10px); }
        40% { transform: translateX(10px); }
        60% { transform: translateX(-6px); }
        80% { transform: translateX(6px); }
      }
    `;
    document.head.appendChild(style);

    // Auto focus password input
    window.addEventListener('load', () => {
      document.getElementById('passwordInput').focus();
    });
  </script>
